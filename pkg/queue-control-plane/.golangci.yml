version: "2"

linters:
  default: standard
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - durationcheck
    - errorlint
    - exptostd
    - fatcontext
    - gocheckcompilerdirectives
    - godoclint
    - gomoddirectives
    - goprintffuncname
    - gosec
    - intrange
    - iotamixing
    - loggercheck
    - makezero
    - mirror
    - misspell
    - musttag
    - nilerr
    - nilnesserr
    - noctx
    - nolintlint
    - nosprintfhostport
    - perfsprint
    - predeclared
    - reassign
    - recvcheck
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - unconvert
    - usestdlibvars
    - wastedassign
    - whitespace
  exclusions:
    generated: strict
    warn-unused: true
    rules:
      - path: _test\.go
        linters:
          - gosec
          - noctx
          - sloglint

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 10m
  relative-path-mode: gomod
