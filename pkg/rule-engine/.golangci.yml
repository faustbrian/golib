version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - bodyclose
    - copyloopvar
    - errorlint
    - exhaustive
    - gocritic
    - gosec
    - misspell
    - nilerr
    - noctx
    - prealloc
    - revive
    - unconvert
    - unparam
    - wastedassign
  settings:
    cyclop:
      max-complexity: 20
    govet:
      enable-all: true
      disable:
        - fieldalignment
  exclusions:
    generated: strict
    presets:
      - common-false-positives
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - gosec
          - noctx

formatters:
  enable:
    - gofmt
    - goimports
