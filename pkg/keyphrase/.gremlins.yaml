unleash:
  exclude-files:
    - ^scripts/
  output-statuses: lct
  workers: 2
  timeout-coefficient: 10
  threshold:
    efficacy: 90
    # Gremlins v0.6.0 rejects equality, so 100 can never pass. This still
    # requires every discovered mutant to be covered for this suite size.
    mutant-coverage: 99.99
