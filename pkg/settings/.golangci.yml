version: "2"
linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - errorlint
    - exhaustive
    - govet
    - ineffassign
    - misspell
    - nilerr
    - noctx
    - nolintlint
    - rowserrcheck
    - staticcheck
    - unconvert
    - unused
formatters:
  enable:
    - gofmt
    - goimports
