apiVersion: batch/v1
kind: Job
metadata:
  name: application-migrations
  labels:
    app.kubernetes.io/component: migrations
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 900
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/component: migrations
    spec:
      restartPolicy: Never
      containers:
        - name: migrations
          image: ghcr.io/example/application:replace-with-immutable-digest
          command: ["/app/migrations"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: application-database
                  key: url
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: "1"
              memory: 256Mi
