version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - asasalint
    - bidichk
    - copyloopvar
    - durationcheck
    - errcheck
    - errorlint
    - exhaustive
    - exptostd
    - fatcontext
    - forcetypeassert
    - gocheckcompilerdirectives
    - gocritic
    - godot
    - govet
    - ineffassign
    - intrange
    - makezero
    - misspell
    - modernize
    - musttag
    - nilerr
    - noctx
    - nolintlint
    - perfsprint
    - prealloc
    - reassign
    - revive
    - sloglint
    - staticcheck
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - wastedassign
    - whitespace
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
    exhaustive:
      default-signifies-exhaustive: true
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow
  exclusions:
    generated: strict
    presets:
      - common-false-positives
      - std-error-handling

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
