version: "2"
run:
  timeout: 5m
linters:
  default: standard
  enable:
    - bodyclose
    - errorlint
    - exhaustive
    - gocritic
    - gosec
    - nilerr
    - noctx
    - revive
    - staticcheck
    - unconvert
  settings:
    revive:
      rules:
        - name: exported
          disabled: false
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
